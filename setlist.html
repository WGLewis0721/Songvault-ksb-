<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setlist — SongVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #141414;
      --border:     #2a2a2a;
      --border-dim: #1c1c1c;
      --gold:       #c9a84c;
      --gold-hover: #d4b860;
      --text:       #ffffff;
      --text-muted: #888888;
      --text-dim:   #555555;
      --green:      #4caf50;
      --serif:      'Playfair Display', Georgia, 'Times New Roman', serif;
      --mono:       'Space Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    nav { display: flex; gap: 4px; align-items: center; }

    nav a {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--gold); border-color: var(--gold); }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 56px 40px 60px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--serif);
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 48px;
    }

    /* ── TWO COLUMN GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
    }

    .panel-title {
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    /* ── SONG PICKER ── */
    .song-pick {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 8px;
      border-bottom: 1px solid var(--border-dim);
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.12s;
    }
    .song-pick:last-child { border-bottom: none; }
    .song-pick:hover { background: rgba(255,255,255,0.025); }

    .song-pick input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--gold);
      flex-shrink: 0;
    }

    .pick-label {
      flex: 1;
      font-family: var(--serif);
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .pick-dur {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .btn-gold {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 4px;
      padding: 13px 0;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-gold:hover  { background: var(--gold-hover); }
    .btn-gold:active { transform: scale(0.98); }

    /* ── SETLIST DISPLAY ── */
    .sl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border-dim);
    }
    .sl-item:last-child { border-bottom: none; }

    .sl-num {
      min-width: 26px;
      height: 26px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
    }

    .sl-title {
      flex: 1;
      font-family: var(--serif);
      font-size: 0.95rem;
      color: var(--text);
    }

    .sl-dur {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .total-bar {
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .total-value {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--gold);
    }

    /* Empty states */
    .empty {
      text-align: center;
      padding: 40px 12px;
      color: var(--text-dim);
    }
    .empty .icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.3; }
    .empty p {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      line-height: 1.8;
    }
    .empty a { color: var(--gold); }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 40px;
      height: 48px;
      display: flex;
      align-items: center;
    }

    .f-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding-right: 24px;
      margin-right: 24px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }
    .f-item:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .f-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    @media (max-width: 768px) {
      header { padding: 0 20px; }
      main   { padding: 36px 20px 40px; }
      h1     { font-size: 2.4rem; }
      footer { padding: 0 20px; overflow-x: auto; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">SongVault</a>
  <nav>
    <a href="index.html">Library</a>
    <a href="add_song.html">Add Song</a>
    <a href="setlist.html" class="active">Setlist</a>
  </nav>
</header>

<main>
  <h1>Setlist Builder</h1>
  <p class="page-subtitle">Check songs to build your setlist — runtime calculated automatically</p>

  <div class="grid">
    <!-- Left: song picker -->
    <div class="panel">
      <p class="panel-title">Choose Songs</p>
      <div id="pickerList"></div>
      <button class="btn-gold" onclick="updateSetlist()">Update Setlist</button>
    </div>

    <!-- Right: current setlist -->
    <div class="panel">
      <p class="panel-title">Current Setlist</p>
      <div id="setlistDisplay"></div>
    </div>
  </div>
</main>

<footer>
  <div class="f-item"><span class="f-dot"></span>App running</div>
  <div class="f-item">Demo: GitHub Pages</div>
  <div class="f-item">localStorage only</div>
  <div class="f-item">No database</div>
  <div class="f-item">static · browser</div>
</footer>

<script src="songvault-mvp.js"></script>
<script>
  function renderPicker() {
    const songs   = svLoadSongs();
    const setlist = svLoadSetlist();
    const picker  = document.getElementById("pickerList");

    if (!songs.length) {
      picker.innerHTML = `
        <div class="empty">
          <div class="icon">🎵</div>
          <p>No songs yet.<br><a href="add_song.html">Add some songs first</a></p>
        </div>`;
      return;
    }

    picker.innerHTML = songs.map(s => `
      <div class="song-pick" onclick="toggleCheck(${s.id})">
        <input type="checkbox" id="chk_${s.id}" value="${s.id}"
          ${setlist.includes(s.id) ? "checked" : ""} />
        <label class="pick-label" for="chk_${s.id}">${svEscHtml(s.title)}</label>
        <span class="pick-dur">${svFmtDuration(s.duration_sec)}</span>
      </div>`).join("");
  }

  function toggleCheck(id) {
    const cb = document.getElementById("chk_" + id);
    cb.checked = !cb.checked;
  }

  function updateSetlist() {
    const songs   = svLoadSongs();
    const checked = songs
      .filter(s => document.getElementById("chk_" + s.id)?.checked)
      .map(s => s.id);
    localStorage.setItem("sv_setlist", JSON.stringify(checked));
    renderSetlist();
  }

  function renderSetlist() {
    const songs   = svLoadSongs();
    const setlist = svLoadSetlist();
    const display = document.getElementById("setlistDisplay");
    const items   = setlist.map(id => songs.find(s => s.id === id)).filter(Boolean);

    if (!items.length) {
      display.innerHTML = `
        <div class="empty">
          <div class="icon">📋</div>
          <p>No setlist yet.<br>Check songs and click<br>Update Setlist.</p>
        </div>`;
      return;
    }

    const totalSec = items.reduce((sum, s) => sum + (s.duration_sec || 0), 0);

    display.innerHTML = `
      <div>
        ${items.map((s, i) => `
          <div class="sl-item">
            <div class="sl-num">${i + 1}</div>
            <div class="sl-title">${svEscHtml(s.title)}</div>
            <div class="sl-dur">${svFmtDuration(s.duration_sec)}</div>
          </div>`).join("")}
      </div>
      <div class="total-bar">
        <span class="total-label">Total Runtime</span>
        <span class="total-value">${svFmtDuration(totalSec)}</span>
      </div>`;
  }

  renderPicker();
  renderSetlist();
</script>
</body>
</html>
